on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Get previous commit SHA
        id: previous-commit
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: package-version
        run: echo "version=$(npm pkg get version | tr -d '"')" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${{ github.sha }}`,
              labels: ['deployment', 'in-progress'],
              body: `
              **Deployment Tracking Issue**
              - Previous Commit: ${{ steps.previous-commit.outputs.sha }}
              - Current Commit: ${{ github.sha }}
              - Package Version: ${{ steps.package-version.outputs.version }}
              `
            });
            core.setOutput('issue_number', issue.number);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    runs-on: ubuntu-latest
    needs: pre-deployment
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get previous commit SHA
        id: previous-commit
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: package-version
        run: echo "version=$(npm pkg get version | tr -d '"')" >> $GITHUB_OUTPUT

      - name: Create rollback artifacts directory
        run: mkdir -p rollback-artifacts

      - name: Create rollback script
        run: |
          cat > rollback-artifacts/rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Starting rollback process..."
          PREVIOUS_COMMIT="${{ steps.previous-commit.outputs.sha }}"
          APP_DIR="."

          echo "✅ Stopping application..."
          # pm2 stop mcpmark-cicd || true

          echo "✅ Reverting to previous commit: $PREVIOUS_COMMIT..."
          git -C $APP_DIR checkout $PREVIOUS_COMMIT

          echo "✅ Restoring dependencies..."
          npm ci

          echo "✅ Verifying application..."
          npm run lint
          npm run test

          echo "✅ Starting application..."
          # pm2 start mcpmark-cicd

          echo "Rollback completed successfully!"
          EOF
          chmod +x rollback-artifacts/rollback.sh

      - name: Create configuration backups
        run: |
          cp package.json rollback-artifacts/package.json.backup
          cp package-lock.json rollback-artifacts/package-lock.json.backup
          [ -f .env.example ] && cp .env.example rollback-artifacts/.env.example.backup

      - name: Create dependency verification script
        run: |
          cat > rollback-artifacts/verify-deps.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail
          echo "Verifying dependency compatibility..."
          npm ls --depth=0
          echo "✅ Dependency verification completed"
          EOF
          chmod +x rollback-artifacts/verify-deps.sh

      - name: Create rollback documentation
        run: |
          cat > rollback-artifacts/ROLLBACK.md << 'EOF'
          # Rollback Documentation for mcpmark-cicd

          ## Step-by-Step Instructions
          1. Download the rollback package from GitHub Actions
          2. Extract to your application directory
          3. Stop the application
          4. Run: `chmod +x rollback.sh && ./rollback.sh`
          5. Verify application functionality

          ## Components
          - Rollback script: rollback.sh
          - Configuration backups: package.json.backup, package-lock.json.backup
          - Dependency check: verify-deps.sh
          - Documentation: ROLLBACK.md
          EOF

      - name: Compress rollback package
        id: compress
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          zip -r $ARTIFACT_NAME.zip rollback-artifacts/
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum ${{ steps.compress.outputs.artifact_name }}.zip | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo $CHECKSUM > ${{ steps.compress.outputs.artifact_name }}.sha256

      - name: Upload rollback artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.compress.outputs.artifact_name }}
          path: |
            ${{ steps.compress.outputs.artifact_name }}.zip
            ${{ steps.compress.outputs.artifact_name }}.sha256
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
              ## 🔄 Rollback Plan Ready

              - **Previous Commit**: ${{ steps.previous-commit.outputs.sha }}
              - **Current Commit**: ${{ github.sha }}
              - **Package Version**: ${{ steps.package-version.outputs.version }}
              - **Artifact**: ${{ steps.compress.outputs.artifact_name }}

              ### Completed Components
              ✅ Rollback script created
              ✅ Configuration backups
              ✅ Dependency verification script
              ✅ Rollback documentation
              ✅ Compressed package with checksum

              ### Quick Rollback
              ```bash
              # Download artifact
              ARTIFACT_URL="https://github.com/${{ context.repo.owner }}/${{ context.repo.repo }}/actions/runs/${{ github.run_id }}/artifacts/$(gh run view ${{ github.run_id }} --json artifacts --jq '.artifacts[] | select(.name == "${{ steps.compress.outputs.artifact_name }}") | .id')/${{ steps.compress.outputs.artifact_name }}.zip"
              curl -sL $ARTIFACT_URL -o rollback.zip
              unzip rollback.zip -d rollback
              cd rollback/rollback-artifacts
              chmod +x rollback.sh
              ./rollback.sh
              ```

              - **Rollback script created**: true
              - **Configuration backup**: true
              - **SHA256**: ${{ steps.checksum.outputs.checksum }}
              `
            });

  post-deployment:
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              name: 'in-progress'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              labels: ['completed']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
              ## 🎉 Deployment Completed Successfully

              **Rollback Artifact**: rollback-package-${{ github.sha }}
              **Retention**: 30 days
              **Download**: [Actions Artifacts](https://github.com/${{ context.repo.owner }}/${{ context.repo.repo }}/actions/runs/${{ github.run_id }})

              This issue is now closed.
              `
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              state: 'closed'
            });
